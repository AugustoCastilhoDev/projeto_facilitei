server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: facilitei-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:facilitei}
    username: ${DB_USER:facilitei}
    password: ${DB_PASSWORD:facilitei}

  jpa:
    # ddl-auto=validate: o schema e sempre criado/alterado pelo Flyway (fonte
    # unica de verdade), o Hibernate so confere se a entidade bate com a tabela.
    # Isso evita divergencia entre "o que o Java acha que existe" e o banco real.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

facilitei:
  jwt:
    # Em producao, JWT_SECRET deve vir de variavel de ambiente/secret manager,
    # nunca do valor default abaixo.
    secret: ${JWT_SECRET:facilitei-local-dev-secret-troque-em-producao-0123456789}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

  asaas:
    # https://api-sandbox.asaas.com/v3 confirmado na documentacao oficial
    # (docs.asaas.com) - nao confundir com dominios antigos/de terceiros que
    # aparecem em buscas (ex.: sandbox.asaas.com/api/v3, que e outra API).
    base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
    # Chave da PROPRIA plataforma, usada para cobrar a assinatura mensal de
    # cada tenant (ver pacote billing) - a cobranca do sinal do cliente final
    # usa a chave de cada tenant (Tenant.asaasApiKey), nao esta aqui - ver
    # modelo BYOPP no README/ROADMAP.
    api-key: ${ASAAS_API_KEY:}
    # Token unico de plataforma que autentica o webhook da assinatura
    # (/api/webhooks/asaas-assinatura) - diferente do token por-tenant do
    # BYOPP, porque so existe UMA conta Asaas da propria plataforma.
    webhook-token: ${ASAAS_SAAS_WEBHOOK_TOKEN:}

  notification:
    # "console" (default, so loga) ou "myzap" (envia WhatsApp de verdade
    # via MyZap - ver notification.myzap.MyZapNotificationService).
    provider: ${NOTIFICATION_PROVIDER:console}

  myzap:
    # https://api.myzap.net/api/v1 confirmado no OpenAPI oficial do MyZap -
    # os endpoints de conta (auth/registrar, auth/login, chaves/fixa) usam
    # /api (sem /v1), mas os de uso (mensagens, conversas, contatos,
    # webhooks) usam /api/v1.
    base-url: ${MYZAP_BASE_URL:https://api.myzap.net/api/v1}
    # Chave fixa da conta (obtida via login + GET /api/chaves/fixa no
    # painel). So e usada quando notification.provider=myzap.
    api-key: ${MYZAP_API_KEY:}

  security:
    # Cifra em repouso a chave Asaas de cada tenant (ver common.crypto).
    # Em producao AMBOS devem vir de variavel de ambiente/secret manager -
    # os defaults abaixo sao so para desenvolvimento local.
    credentials-encryption-key: ${CREDENTIALS_ENCRYPTION_KEY:facilitei-local-dev-encryption-key-troque-em-producao}
    credentials-encryption-salt: ${CREDENTIALS_ENCRYPTION_SALT:deadbeefcafe0123}

logging:
  level:
    com.castilhodigital.facilitei: DEBUG

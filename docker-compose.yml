services:
  postgres:
    image: postgres:17-alpine
    container_name: facilitei-postgres
    environment:
      POSTGRES_DB: facilitei
      POSTGRES_USER: facilitei
      POSTGRES_PASSWORD: facilitei
    ports:
      - "5432:5432"
    volumes:
      - facilitei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facilitei -d facilitei"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  facilitei_postgres_data:

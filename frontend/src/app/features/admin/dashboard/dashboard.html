<mat-toolbar color="primary">
  <span>Painel do Facilitei</span>
  <span class="spacer"></span>
  @if (tenantSlug) {
    <span class="tenant-slug">{{ tenantSlug }}</span>
  }
  <button mat-icon-button (click)="sair()" aria-label="Sair" title="Sair">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<nav mat-tab-nav-bar [tabPanel]="painel">
  <a mat-tab-link routerLink="agenda" routerLinkActive #agendaLink="routerLinkActive" [active]="agendaLink.isActive">
    Agenda
  </a>
  <a
    mat-tab-link
    routerLink="servicos"
    routerLinkActive
    #servicosLink="routerLinkActive"
    [active]="servicosLink.isActive"
  >
    Servicos
  </a>
  <a
    mat-tab-link
    routerLink="profissionais"
    routerLinkActive
    #profissionaisLink="routerLinkActive"
    [active]="profissionaisLink.isActive"
  >
    Profissionais
  </a>
  <a
    mat-tab-link
    routerLink="pagamentos"
    routerLinkActive
    #pagamentosLink="routerLinkActive"
    [active]="pagamentosLink.isActive"
  >
    Pagamentos
  </a>
  <a
    mat-tab-link
    routerLink="relatorios"
    routerLinkActive
    #relatoriosLink="routerLinkActive"
    [active]="relatoriosLink.isActive"
  >
    Relatorios
  </a>
</nav>

<mat-tab-nav-panel #painel class="dashboard-content">
  <router-outlet />
</mat-tab-nav-panel>
